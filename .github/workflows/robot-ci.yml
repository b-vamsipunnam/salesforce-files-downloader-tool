name: Robot CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  robot-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # Configure Python and dependency caching
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      # Create directories used by the framework, and CI reports
      - name: Prepare directories
        run: |
          mkdir -p results/smoke
          mkdir -p input artifacts downloads

      # GitHub's Ubuntu runner includes Google Chrome
      - name: Check Chrome
        run: google-chrome --version

      # Install and validate project dependencies
      - name: Install dependencies
        run: |
          python --version
          python -m pip --version
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      # Make local Robot Framework Python libraries importable
      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=${GITHUB_WORKSPACE}/src/robot/libraries:${GITHUB_WORKSPACE}" >> "$GITHUB_ENV"

      # Strict, unauthenticated framework smoke tests
      - name: Run CI smoke tests
        run: |
          robot \
            --outputdir results/smoke \
            --loglevel INFO \
            ci/robot/smoke.robot

      # Display generated results for troubleshooting
      - name: List results
        if: always()
        run: |
          echo "Results content:"
          ls -la results || true

          echo "Smoke results:"
          ls -la results/smoke || true

      # Remove sensitive runtime files before artifact collection
      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f org_info.json

      # Preserve smoke-test reports even when a test fails
      - name: Upload smoke-test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-smoke-results
          path: results/smoke
          if-no-files-found: ignore
          retention-days: 7
